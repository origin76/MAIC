# --- Action-intent microcomm with gate floor + stronger residual learning signal ---

action_selector: "multinomial"
epsilon_start: 0.0
epsilon_finish: 0.0
epsilon_anneal_time: 1
test_greedy: True

runner: "parallel_local_safe"
batch_size_run: 4
env_reset_stagger_sec: 0.0

buffer_size: 8
batch_size: 8
burn_in_period: 8
num_circle: 1

agent_output_type: "pi_logits"
mask_before_softmax: True
learner: "mappo_agentwise_centralized_officialish_learner"
mac: "maic_mac"
agent: "vanilla_mappo_microcomm_residual_adapter"

rnn_hidden_dim: 64

attention_dim: 16
attention_heads: 1
comm_value_dim: 4
comm_topk: 2
log_attention_maps: False
residual_comm_scale: 0.1
adapter_gate_init_bias: -2.0
adapter_gate_floor: 0.1
adapter_zero_init: True
adapter_input_gain: 2.0
comm_detach_backbone: False
comm_value_source: "action_intent"
intent_use_probs: True
intent_detach: False
intent_mask_unavailable: True
attention_entropy_loss_weight: 0.0005

critic_use_local_obs: True
critic_use_last_action: True
critic_use_agent_id: True

use_valuenorm: True
use_huber_loss: True
huber_delta: 10.0
use_policy_active_masks: True
use_value_active_masks: True
use_clipped_value_loss: True

use_linear_lr_decay: False
target_kl: 0.02

ppo_epochs: 6
ppo_clip_param: 0.2
value_clip_param: 0.2
gae_lambda: 0.95
entropy_coef: 0.02
value_coef: 1.0
critic_hidden_dim: 256

lr: 0.0001
critic_lr: 0.0003
optim_eps: 0.00001
grad_norm_clip: 5

t_max: 300000

save_model: True
save_model_interval: 25000

init_checkpoint_path: "results/models/2026-04-13_10-42-26_vanilla_mappo_sc2_5m6m_agentwise_centralized_semistable_officialish_1p5m_lrdecay_klstop_relaxactor_sc2_5m_vs_6m"
init_load_step: 1404757
init_load_strict: False
init_load_actor: True
init_load_critic: True
init_load_value_norm: True

name: "vanilla_mappo_sc2_5m6m_microcomm_adapter_v3_action_intent_end2end_fusionboost"
