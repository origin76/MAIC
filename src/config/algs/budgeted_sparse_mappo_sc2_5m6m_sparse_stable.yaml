# --- Sparse compromise + stable PPO updates for 5m_vs_6m ---
#
# Design goal:
# 1. Keep selective communication (top-k = 3) instead of full communication.
# 2. Retain only a weak epsilon floor to help early exploration.
# 3. Use moderate entropy regularization.
# 4. Make late-stage PPO updates more conservative to reduce performance drift.

action_selector: "multinomial"
epsilon_start: 0.02
epsilon_finish: 0.005
epsilon_anneal_time: 100000
test_greedy: True

runner: "parallel"
batch_size_run: 4

buffer_size: 8
batch_size: 8
burn_in_period: 8
num_circle: 1

agent_output_type: "pi_logits"
mask_before_softmax: True
learner: "budgeted_sparse_mappo_learner"
mac: "maic_mac"
agent: "budgeted_sparse_mappo"

rnn_hidden_dim: 64
attention_dim: 32
attention_heads: 2
comm_value_dim: 4
comm_topk: 3
head_budget_loss_weight: 0.0
log_attention_maps: False

ppo_epochs: 4
ppo_clip_param: 0.15
gae_lambda: 0.95
entropy_coef: 0.03
value_coef: 1.0
critic_hidden_dim: 256

lr: 0.0002
critic_lr: 0.0005
optim_eps: 0.00001
grad_norm_clip: 10

save_model: True
save_model_interval: 50000

name: "budgeted_sparse_mappo_sc2_5m6m_sparse_stable"
