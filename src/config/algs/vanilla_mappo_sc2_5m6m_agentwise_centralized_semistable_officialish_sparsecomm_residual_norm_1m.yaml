# --- Officialish MAPPO backbone + normalized residual sparse communication ---

action_selector: "multinomial"
epsilon_start: 0.0
epsilon_finish: 0.0
epsilon_anneal_time: 1
test_greedy: True

runner: "parallel_local_safe"
batch_size_run: 4
env_reset_stagger_sec: 0.0

buffer_size: 8
batch_size: 8
burn_in_period: 8
num_circle: 1

agent_output_type: "pi_logits"
mask_before_softmax: True
learner: "mappo_agentwise_centralized_officialish_learner"
mac: "maic_mac"
agent: "vanilla_mappo_sparse_comm_residual_norm"

rnn_hidden_dim: 64

attention_dim: 32
attention_heads: 2
comm_value_dim: 4
comm_topk: 3
head_budget_loss_weight: 0.0
log_attention_maps: False
comm_eval_renorm: True
comm_eval_threshold: 0.25

residual_comm_scale: 0.5
residual_gate_hidden_dim: 64
head_gate_init_bias: -0.5
residual_gate_init_bias: -1.0

critic_use_local_obs: True
critic_use_last_action: True
critic_use_agent_id: True

use_valuenorm: True
use_huber_loss: True
huber_delta: 10.0
use_policy_active_masks: True
use_value_active_masks: True
use_clipped_value_loss: True

ppo_epochs: 6
ppo_clip_param: 0.2
value_clip_param: 0.2
gae_lambda: 0.95
entropy_coef: 0.02
value_coef: 1.0
critic_hidden_dim: 256

lr: 0.0004
critic_lr: 0.0007
optim_eps: 0.00001
grad_norm_clip: 5

t_max: 1000000

save_model: True
save_model_interval: 50000

name: "vanilla_mappo_sc2_5m6m_agentwise_centralized_semistable_officialish_sparsecomm_residual_norm_1m"
