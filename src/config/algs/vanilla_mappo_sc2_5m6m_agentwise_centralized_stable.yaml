# --- Vanilla MAPPO with agent-wise centralized critic, tuned for late-stage stability ---
#
# Design goal:
# 1. Keep the stronger agent-wise centralized critic.
# 2. Preserve no-epsilon PPO sampling and value clipping.
# 3. Reduce late-stage policy drift with milder PPO updates.
# 4. Save checkpoints more frequently so mid-training peaks are easier to keep.

action_selector: "multinomial"
epsilon_start: 0.0
epsilon_finish: 0.0
epsilon_anneal_time: 1
test_greedy: True

runner: "parallel_local_safe"
batch_size_run: 4
env_reset_stagger_sec: 0.0

buffer_size: 8
batch_size: 8
burn_in_period: 8
num_circle: 1

agent_output_type: "pi_logits"
mask_before_softmax: True
learner: "mappo_agentwise_centralized_vclip_learner"
mac: "maic_mac"
agent: "vanilla_mappo"

rnn_hidden_dim: 64

critic_use_local_obs: True
critic_use_last_action: True
critic_use_agent_id: True

ppo_epochs: 5
ppo_clip_param: 0.15
value_clip_param: 0.15
gae_lambda: 0.95
entropy_coef: 0.015
value_coef: 1.0
critic_hidden_dim: 256

lr: 0.0003
critic_lr: 0.0005
optim_eps: 0.00001
grad_norm_clip: 5

save_model: True
save_model_interval: 25000

name: "vanilla_mappo_sc2_5m6m_agentwise_centralized_stable"
