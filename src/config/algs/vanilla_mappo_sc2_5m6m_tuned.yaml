# --- Vanilla MAPPO (No Communication) for 5m_vs_6m ---

action_selector: "multinomial"
epsilon_start: 0.1
epsilon_finish: 0.02
epsilon_anneal_time: 100000
test_greedy: True

runner: "parallel"
batch_size_run: 4

buffer_size: 8
batch_size: 8
burn_in_period: 8
num_circle: 1

agent_output_type: "pi_logits"
mask_before_softmax: True
learner: "budgeted_sparse_mappo_learner"
mac: "maic_mac"
agent: "vanilla_mappo"

rnn_hidden_dim: 64

ppo_epochs: 8
ppo_clip_param: 0.2
gae_lambda: 0.95
entropy_coef: 0.03
value_coef: 1.0
critic_hidden_dim: 256

lr: 0.0005
critic_lr: 0.001
optim_eps: 0.00001
grad_norm_clip: 10

save_model: True
save_model_interval: 50000

name: "vanilla_mappo_sc2_5m6m_tuned"
