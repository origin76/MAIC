# --- MAIC tuned for Join1 while keeping the original algorithm intact ---

save_model: False # Save the models to disk
save_model_interval: 1000000 # Save models after this many timesteps

# Faster exploration decay for the short-horizon Join1 task.
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.02
epsilon_anneal_time: 15000

# Match the faster wall-clock collection pattern used by the MAPPO variant.
runner: "parallel"
batch_size_run: 8

# Join1 is simple and short-horizon, so a smaller replay window reduces stale
# off-policy data without changing the underlying MAIC update rule.
batch_size: 32
buffer_size: 512
burn_in_period: 32

# Update targets a bit more frequently to track the quickly-improving policy.
target_update_interval: 100

# Keep the original MAIC learner and mixer.
agent_output_type: "q"
learner: "maic_learner"
double_q: True
mixer: "qmix"
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

mac: "maic_mac"
agent: "maic"

latent_dim: 8
attention_dim: 32
nn_hidden_size: 64

# Retain MAIC's communication regularisers, but soften them for a simpler task
# where overly strong auxiliary pressure can slow down policy improvement.
mi_loss_weight: 0.0002
entropy_loss_weight: 0.002
msg_l1_reg_loss_weight: 0
var_floor: 0.002
log_weights: True

name: "maic_parallel_join1_tuned"
